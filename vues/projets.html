<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archives Projets | Nadia Nmissi</title>
    <!-- Open Graph SEO Meta Tags -->
    <meta property="og:title" content="Archives Projets | NMISSI NADIA">
    <meta property="og:description" content="Découvrez tous mes projets web, expérimentations et applications.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://nmissi-nadia.github.io/vues/projets.html">
    <meta property="og:image" content="https://avatars.githubusercontent.com/u/100000000">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <!-- Import des données -->
    <script src="../assets/js/projects-data.js"></script>
</head>

<body class="antialiased overflow-x-hidden">

    <div id="stars-background" class="fixed inset-0 z-0 pointer-events-none"></div>
    <div id="nebula-effect" class="fixed inset-0 z-0 pointer-events-none"></div>

    <header class="relative z-20 p-4 sticky top-0 bg-interactive-block backdrop-blur-sm border-b border-accent-style transition duration-500">
        <nav class="flex justify-between items-center max-w-6xl mx-auto">
            <a href="index.html" class="text-xl font-bold text-accent-style tracking-widest transition duration-500">Nadia NMISSI. 🛰️</a>
            
            <div class="flex items-center space-x-4">
                <button id="theme-switcher" class="p-1 rounded-full text-accent-style hover:bg-gray-200/20 transition duration-300 mr-2">
                    <div class="theme-icon-container">
                        <span id="moon-icon" class="theme-icon text-2xl">🌙</span>
                        <span id="sun-icon" class="theme-icon text-2xl">☀️</span>
                    </div>
                </button>
                <!-- Language Switcher -->
                <button id="lang-switcher" class="px-2 py-1 rounded border border-accent-style text-accent-style font-bold text-sm hover:bg-accent-style hover:text-gray-900 transition duration-300 mr-2">
                    FR
                </button>
                <a href="index.html" class="px-4 py-2 border border-accent-style text-accent-style rounded-full font-bold hover:bg-accent-style hover:text-gray-900 transition duration-300" data-lang="btn_back">Retour Accueil</a>
            </div>
        </nav>
    </header>

    <main class="relative z-10 max-w-6xl mx-auto p-8 min-h-screen">
        
        <section class="pt-12 pb-20 reveal">
            <h1 class="text-4xl md:text-5xl font-extrabold text-center text-white mb-6">
                ARCHIVES DES PROJETS <i class='fa-solid fa-folder-open text-accent-style'></i>
            </h1>
            <p class="text-center text-gray-400 mb-12 max-w-2xl mx-auto" data-lang="archive_desc">Exploration complète de mes développements, applications et expérimentations.</p>
            
            <!-- Filtres de Projets -->
            <div id="project-filters" class="flex flex-wrap justify-center gap-4 mb-10">
                <button class="filter-btn active px-4 py-2 rounded-full border border-accent-style bg-accent-style text-white font-bold transition duration-300" data-filter="all">Tous</button>
                <button class="filter-btn px-4 py-2 rounded-full border border-accent-style text-accent-style hover:bg-accent-style hover:text-white font-bold transition duration-300" data-filter="JavaScript">JavaScript</button>
                <button class="filter-btn px-4 py-2 rounded-full border border-accent-style text-accent-style hover:bg-accent-style hover:text-white font-bold transition duration-300" data-filter="TypeScript">TypeScript</button>
                <button class="filter-btn px-4 py-2 rounded-full border border-accent-style text-accent-style hover:bg-accent-style hover:text-white font-bold transition duration-300" data-filter="Java">Java</button>
                <button class="filter-btn px-4 py-2 rounded-full border border-accent-style text-accent-style hover:bg-accent-style hover:text-white font-bold transition duration-300" data-filter="PHP">PHP</button>
                <button class="filter-btn px-4 py-2 rounded-full border border-accent-style text-accent-style hover:bg-accent-style hover:text-white font-bold transition duration-300" data-filter="Laravel">Laravel</button>
            </div>
            
            <!-- Container Grille -->
            <div id="all-projects-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Les projets seront injectés ici par JS -->
            </div>

            <!-- Pagination Controls -->
            <div class="flex justify-center items-center space-x-6 mt-16">
                <button id="prev-page-btn" class="btn-girly disabled:opacity-50 disabled:cursor-not-allowed" data-lang="btn_prev">
                    &lt; Précédent
                </button>
                <span id="page-indicator" class="text-xl text-accent-style font-bold">Page 1</span>
                <button id="next-page-btn" class="btn-girly disabled:opacity-50 disabled:cursor-not-allowed" data-lang="btn_next">
                    Suivant &gt;
                </button>
            </div>
        </section>

    </main>

    <footer class="text-center p-6 border-t border-accent-style transition duration-500 bg-interactive-block">
        <p class="text-gray-500">&copy; <span id="current-year"></span> Nadia Nmissi.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // --- 0. ANIMATION SCROLL REVEAL (PRIORITAIRE) ---
            const reveals = document.querySelectorAll('.reveal');
            const revealOnScroll = () => {
                const windowHeight = window.innerHeight;
                const elementVisible = 50;
                reveals.forEach((reveal) => {
                    const elementTop = reveal.getBoundingClientRect().top;
                    if (elementTop < windowHeight - elementVisible) {
                        reveal.classList.add('active');
                    }
                });
            };
            window.addEventListener('scroll', revealOnScroll);
            setTimeout(revealOnScroll, 100);

            // --- GESTION DU THEME (Copie simplifiée) ---
            const themeSwitcher = document.getElementById('theme-switcher');
            const body = document.body;
            const nebulaEffect = document.getElementById('nebula-effect');
            
            const toggleTheme = () => {
                const isDayMode = body.classList.toggle('day-mode');
                if (isDayMode) {
                    nebulaEffect.style.opacity = '0';
                    localStorage.setItem('theme', 'day');
                } else {
                    nebulaEffect.style.opacity = '0.8';
                    localStorage.setItem('theme', 'night');
                }
            };

            const savedTheme = localStorage.getItem('theme') || 'night';
            if (savedTheme === 'day') {
                body.classList.add('day-mode');
                nebulaEffect.style.opacity = '0';
            } else {
                nebulaEffect.style.opacity = '0.8';
            }
            themeSwitcher.addEventListener('click', toggleTheme);

            // --- GESTION DE LA LANGUE ---
            const langSwitcher = document.getElementById('lang-switcher');
            let currentLang = localStorage.getItem('lang') || 'fr';

            const updatePageLanguage = (lang) => {
                if (typeof translations === 'undefined') return;

                document.querySelectorAll('[data-lang]').forEach(el => {
                    const key = el.getAttribute('data-lang');
                    el.innerHTML = translations[lang][key] || el.innerHTML;
                });
                langSwitcher.textContent = lang.toUpperCase();
                // Re-render current page to update dynamic texts
                renderPage(currentPage);
            };

            langSwitcher.addEventListener('click', () => {
                currentLang = currentLang === 'fr' ? 'en' : 'fr';
                localStorage.setItem('lang', currentLang);
                updatePageLanguage(currentLang);
            });

            // Initialisation Langue
            // (Appelé à la fin après renderPage)

            // --- GESTION DES ETOILES ---
            const starContainer = document.getElementById('stars-background');
            const numStars = 100; 
            for (let i = 0; i < numStars; i++) {
                const star = document.createElement('div');
                star.className = 'star'; 
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                const size = Math.random() * 3 + 1;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.animationDuration = `${Math.random() * 2 + 1}s`;
                starContainer.appendChild(star);
            }

            // --- LOGIQUE DE PAGINATION ET FILTRES ---
            let allProjects = (typeof getProjects === 'function') ? getProjects() : [];
            let filteredProjects = [...allProjects];
            const container = document.getElementById('all-projects-container');
            const prevBtn = document.getElementById('prev-page-btn');
            const nextBtn = document.getElementById('next-page-btn');
            const pageIndicator = document.getElementById('page-indicator');
            const filterBtns = document.querySelectorAll('.filter-btn');

            const itemsPerPage = 6;
            let currentPage = 1;

            function renderPage(page) {
                if (!container) return;
                if (typeof translations === 'undefined') return;

                const totalPages = Math.ceil(filteredProjects.length / itemsPerPage) || 1;
                
                if(page > totalPages) {
                    page = 1;
                    currentPage = 1;
                }

                container.innerHTML = '';
                const start = (page - 1) * itemsPerPage;
                const end = start + itemsPerPage;
                const projectsToShow = filteredProjects.slice(start, end);

                projectsToShow.forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'flex flex-col p-6 rounded-xl border border-accent-style bg-interactive-block transition duration-300 transform hover:-translate-y-2';
                    
                    const statsHtml = (p.stars !== undefined && p.forks !== undefined && window.githubDataFetched) 
                        ? `<span class="text-xs bg-gray-800 text-yellow-400 px-2 py-1 rounded ml-2"><i class="fa-solid fa-star"></i> ${p.stars} <i class="fa-solid fa-code-branch ml-1"></i> ${p.forks}</span>` 
                        : '';

                    card.innerHTML = `
                        <div class="h-48 w-full mb-4 overflow-hidden rounded-lg border border-gray-700 bg-gray-900 relative group">
                            <div class="flex items-center justify-center w-full h-full bg-interactive-block transition duration-500 group-hover:scale-110 text-accent-style">
                                <svg class="w-20 h-20" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                                </svg>
                            </div>
                            <div class="absolute inset-0 bg-black bg-opacity-50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition duration-300">
                                <span class="text-accent-style font-bold border border-accent-style px-4 py-2 rounded-full">${translations[currentLang].card_details}</span>
                            </div>
                        </div>
                        <h3 class="text-xl font-bold text-accent-style mb-2">${p.title}</h3>
                        <p class="text-sm text-gray-400 mb-4 flex-grow">${p.desc}</p>
                        <div class="mt-auto pt-4 border-t border-gray-700">
                            <div class="flex justify-between items-center mb-4">
                                <div class="flex items-center">
                                    <span class="text-xs bg-gray-700 text-white px-2 py-1 rounded">${p.tech}</span>
                                    ${statsHtml}
                                </div>
                            </div>
                            <a href="${p.link}" target="_blank" class="block w-full text-center py-2 btn-girly w-full">${translations[currentLang].card_repo}</a>
                        </div>
                    `;
                    container.appendChild(card);
                });

                pageIndicator.textContent = `Page ${page} / ${totalPages}`;
                prevBtn.disabled = page === 1;
                nextBtn.disabled = page === totalPages || totalPages === 0;
            }

            function applyFilter(filterValue) {
                if(filterValue === 'all') {
                    filteredProjects = [...allProjects];
                } else {
                    filteredProjects = allProjects.filter(p => {
                        return p.tech && p.tech.toLowerCase().includes(filterValue.toLowerCase());
                    });
                }
                currentPage = 1;
                renderPage(currentPage);
            }

            filterBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    filterBtns.forEach(b => {
                        b.classList.remove('active', 'bg-accent-style', 'text-white');
                        b.classList.add('text-accent-style');
                    });
                    e.target.classList.add('active', 'bg-accent-style', 'text-white');
                    e.target.classList.remove('text-accent-style');
                    
                    applyFilter(e.target.dataset.filter);
                });
            });

            prevBtn.addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    renderPage(currentPage);
                }
            });

            nextBtn.addEventListener('click', () => {
                const totalPages = Math.ceil(filteredProjects.length / itemsPerPage);
                if (currentPage < totalPages) {
                    currentPage++;
                    renderPage(currentPage);
                }
            });

            document.addEventListener('githubStatsReady', () => {
                allProjects = getProjects();
                const activeBtn = document.querySelector('.filter-btn.active');
                if(activeBtn) {
                    applyFilter(activeBtn.dataset.filter);
                }
            });

            // Initialisation
            renderPage(currentPage);
            updatePageLanguage(currentLang); // Appliquer la langue après le premier rendu
            document.getElementById('current-year').textContent = new Date().getFullYear();
        });
    </script>
</body>
</html>
